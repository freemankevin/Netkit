{{- if .Values.rbac.create -}}
{{- if .Values.rbac.clusterRole.create - }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "network-tools.fullname" . }}-cluster
  labels:
    {{- include "network-tools.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "network-tools.fullname" . }}-cluster
  labels:
    {{- include "network-tools.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "network-tools.fullname" . }}-cluster
subjects:
- kind: ServiceAccount
  name: {{ include "network-tools.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- end -}}
{{- end -}}

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "network-tools.fullname" . }}
  labels:
    {{- include "network-tools.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end -}}
{{- end -}}
