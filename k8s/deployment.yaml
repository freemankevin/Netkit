---
apiVersion: v1
kind: Namespace
metadata:
  name: netkit
  labels:
    app: netkit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netkit
  namespace: netkit
  labels:
    app: netkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netkit
  template:
    metadata:
      labels:
        app: netkit
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: netkit
      containers:
      - name: netkit
        image: ghcr.io/freemankevin/netkit:latest
        imagePullPolicy: Always
        command: ["/bin/bash"]
        args: ["-c", "sleep infinity"]
        env:
        - name: TZ
          value: "Asia/Shanghai"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          runAsUser: 0
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - NET_BROADCAST
            - SYS_PTRACE
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}
      tolerations:
      - operator: "Exists"
        effect: "NoExecute"
      - operator: "Exists"
        effect: "NoSchedule"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netkit
  namespace: netkit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netkit
rules:
- apiGroups: [""]
  resources:
  - pods
  - services
  - endpoints
  - nodes
  - namespaces
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources:
  - networkpolicies
  - ingresses
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
  - pods/exec
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netkit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: netkit
subjects:
- kind: ServiceAccount
  name: netkit
  namespace: netkit
---
apiVersion: v1
kind: Service
metadata:
  name: netkit
  namespace: netkit
  labels:
    app: netkit
spec:
  type: ClusterIP
  ports:
  - name: iperf3
    port: 5201
    targetPort: 5201
    protocol: TCP
  selector:
    app: netkit