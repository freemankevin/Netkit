apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-tools
  labels:
    app: network-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-tools
  template:
    metadata:
      labels:
        app: network-tools
    spec:
      containers:
      - name: network-tools
        image: ghcr.io/freemankevin/network-tools:latest
        imagePullPolicy: Always
        command: ["/bin/bash"]
        args: ["-c", "sleep infinity"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            add: ["NET_ADMIN", "NET_RAW"]
---
apiVersion: v1
kind: Service
metadata:
  name: network-tools
  labels:
    app: network-tools
spec:
  type: ClusterIP
  ports:
  - port: 8523
    targetPort: 8523
    protocol: TCP
  selector:
    app: network-tools
